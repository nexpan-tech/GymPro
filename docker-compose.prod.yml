services:
  redis:
    image: redis:7-alpine
    container_name: gympro-redis-prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gympro-backend-prod
    env_file:
      - .env.production
    expose:
      - "5050"
    depends_on:
      - redis
    restart: always
    command: pnpm --filter backend start

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gympro-worker-prod
    env_file:
      - .env.production
    depends_on:
      - redis
      - backend
    restart: always
    command: pnpm --filter backend worker

  nginx:
    image: nginx:alpine
    container_name: gympro-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: always

volumes:
  redis-data: