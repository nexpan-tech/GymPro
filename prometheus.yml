global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "gympro-monitor"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "prometheus.rules.yml"
  # - "first_rules.yml"
  # - "second_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # GymPro Backend API
  - job_name: "gympro-backend"
    static_configs:
      - targets: ["backend:5050"]
    metrics_path: "/api/health/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  # Redis (if redis_exporter is used - future)
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # Node Exporter (if deployed - future)
  # - job_name: "node"
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
